<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Atlas</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <div class="brand"><h1>Atlas</h1><span id="stamp"></span></div>
  <form id="quick-add" autocomplete="off">
    <input id="thought" placeholder="Jot a thought… (Enter files it)" maxlength="500">
    <select id="target"><option value="unsorted">unsorted</option></select>
  </form>
</header>
<main>
  <section><h2>Products</h2><div class="grid" id="products"></div></section>
  <section><h2>Satellites &amp; infra</h2><ul id="satellites"></ul></section>
  <section><h2>Unsorted thoughts</h2><ul id="unsorted"></ul></section>
</main>
<div id="detail-overlay" hidden><section id="detail"></section></div>
<script src="app.js"></script>
</body>
</html>
